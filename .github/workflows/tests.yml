name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran g++ make

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-xdist requests vegas

      - name: Run pytest (excluding slow OpenLoops tests)
        run: |
          # Skip tests that need OpenLoops (not installed in CI by default).
          # Tests that detect OpenLoops missing skip themselves automatically.
          pytest tests/ -q --tb=short --ignore=tests/test_openloops_bridge.py \
                            --ignore=tests/test_nlo_general.py \
                            --maxfail=5
